syntax = "proto3";

package bento.v1;

import "common.proto";

service InstanceControlService {
  rpc Health(InstanceControlHealthRequest) returns (InstanceControlHealthResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc WatchStatus(WatchStatusRequest) returns (stream StatusUpdate);
}

message InstanceControlHealthRequest {}

message InstanceControlHealthResponse {
  bool ok = 1;
  string message = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  LifecycleState vm_state = 1;
  LifecycleState guest_state = 2;
  bool ready = 3;
  string summary = 4;
  repeated CapabilityStatus capabilities = 5;
  repeated EndpointStatus endpoints = 6;
}

message WatchStatusRequest {}

enum StatusSource {
  STATUS_SOURCE_UNSPECIFIED = 0;
  STATUS_SOURCE_VM = 1;
  STATUS_SOURCE_GUEST = 2;
}

enum LifecycleState {
  LIFECYCLE_STATE_UNSPECIFIED = 0;
  LIFECYCLE_STATE_STARTING = 1;
  LIFECYCLE_STATE_RUNNING = 2;
  LIFECYCLE_STATE_STOPPING = 3;
  LIFECYCLE_STATE_STOPPED = 4;
  LIFECYCLE_STATE_ERROR = 5;
}

message StatusUpdate {
  StatusSource source = 1;
  LifecycleState state = 2;
  string message = 3;
  int64 timestamp_unix_ms = 4;
}

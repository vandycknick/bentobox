syntax = "proto3";

package bento.v1;

import "common.proto";

service AgentControlService {
  rpc Register(RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc GetConfig(GetAgentConfigRequest) returns (GetAgentConfigResponse);
}

message RegisterAgentRequest {
  string agent_version = 1;
  SystemInfo system_info = 2;
}

message RegisterAgentResponse {
  bool accepted = 1;
  string message = 2;
}

message GetAgentConfigRequest {}

message GetAgentConfigResponse {
  string config = 1;
}
